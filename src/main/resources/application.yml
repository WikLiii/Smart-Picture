server:
  port: 8888
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

spring:
  #redis配置
  redis:
    database: 0
    host: 127.0.0.1
    port: 6379
    timeout: 5000
  application:
    name: smart-picture-backend
  #Session配置
  session:
    store-type: redis
    timeout: 2592000
   # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_picture
    username: root
    password: 1234
    # 空间图片分表
  shardingsphere:
    datasource:
      names: smart_picture
      smart_picture:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/smart_picture
        username: root
        password: 1234
    rules:
       sharding:
         tables:
           picture:
            actual-data-nodes: smart_picture.picture # 动态分表
            table-strategy:
              standard:
                 sharding-column: spaceId
                 sharding-algorithm-name: picture_sharding_algorithm  # 使用自定义分片算法
         sharding-algorithms:
           picture_sharding_algorithm:
            type: CLASS_BASED
            props:
               strategy: standard
               algorithmClassName: com.wjh.smartpicturebackend.manager.sharding.PictureShardingAlgorithm
    props:
        sql-show: true

mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: false
    # 仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    enable-sql-runner: true
    # 逻辑删除（只改变一个值）
    db-config:
      logic-delete-field: isDeleted # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为0）
 #接口文档配置
knife4j:
  enable: true
  openapi:
    title: 接口文档
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.wjh.smartpicturebackend.controller
